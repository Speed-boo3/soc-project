name: Daily Log Scan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - name: Generate fresh log file
        run: python soc/log-parser/generate_logs.py

      - name: Parse logs
        run: python soc/log-parser/parser.py --file soc/log-parser/sample.log --output parsed.json

      - name: Run alert engine
        run: python soc/alert-rules/alert_engine.py --logs parsed.json --rules soc/alert-rules/rules.yaml --output alerts.log

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add soc/log-parser/sample.log alerts.log
          git diff --staged --quiet || git commit -m "Daily scan: $(date +%Y-%m-%d)"
          git push
