<svg viewBox="0 0 800 90" xmlns="http://www.w3.org/2000/svg" width="800" height="90">
  <rect width="800" height="90" fill="#0d1117" rx="10"/>

  <!-- Steps -->
  <rect x="10" y="20" width="118" height="50" rx="7" fill="#1a0505" stroke="#ff4444" stroke-width="1.5"/>
  <text x="69" y="42" text-anchor="middle" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">TRIAGE</text>
  <text x="69" y="57" text-anchor="middle" fill="#666" font-family="JetBrains Mono,monospace" font-size="8">Real or false positive?</text>
  <text x="69" y="67" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="7">5 min target</text>

  <line x1="130" y1="45" x2="148" y2="45" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <polygon points="148,41 156,45 148,49" fill="#ff4444"/>

  <rect x="158" y="20" width="118" height="50" rx="7" fill="#1a0800" stroke="#ff8800" stroke-width="1.5"/>
  <text x="217" y="42" text-anchor="middle" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">CONTAIN</text>
  <text x="217" y="57" text-anchor="middle" fill="#666" font-family="JetBrains Mono,monospace" font-size="8">Stop the spread</text>
  <text x="217" y="67" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="7">30 min (HIGH)</text>

  <line x1="278" y1="45" x2="296" y2="45" stroke="#ff8800" stroke-width="1.5" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.6s" repeatCount="indefinite" begin="0.15s"/>
  </line>
  <polygon points="296,41 304,45 296,49" fill="#ff8800"/>

  <rect x="306" y="20" width="118" height="50" rx="7" fill="#1a1200" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="365" y="42" text-anchor="middle" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">INVESTIGATE</text>
  <text x="365" y="57" text-anchor="middle" fill="#666" font-family="JetBrains Mono,monospace" font-size="8">Build the timeline</text>
  <text x="365" y="67" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="7">Evidence-based</text>

  <line x1="426" y1="45" x2="444" y2="45" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.6s" repeatCount="indefinite" begin="0.3s"/>
  </line>
  <polygon points="444,41 452,45 444,49" fill="#ffcc00"/>

  <rect x="454" y="20" width="118" height="50" rx="7" fill="#001a00" stroke="#00ff41" stroke-width="1.5"/>
  <text x="513" y="42" text-anchor="middle" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">ERADICATE</text>
  <text x="513" y="57" text-anchor="middle" fill="#666" font-family="JetBrains Mono,monospace" font-size="8">Remove the threat</text>
  <text x="513" y="67" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="7">Patch the gap</text>

  <line x1="574" y1="45" x2="592" y2="45" stroke="#00ff41" stroke-width="1.5" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.6s" repeatCount="indefinite" begin="0.45s"/>
  </line>
  <polygon points="592,41 600,45 592,49" fill="#00ff41"/>

  <rect x="602" y="20" width="186" height="50" rx="7" fill="#050a1a" stroke="#4488ff" stroke-width="1.5"/>
  <text x="695" y="42" text-anchor="middle" fill="#4488ff" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">POST-INCIDENT</text>
  <text x="695" y="57" text-anchor="middle" fill="#666" font-family="JetBrains Mono,monospace" font-size="8">Report + improve rules</text>
  <text x="695" y="67" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="7">Within 5 business days</text>

  <text x="400" y="86" text-anchor="middle" fill="#333" font-family="JetBrains Mono,monospace" font-size="8" letter-spacing="2">NIST SP 800-61 INCIDENT RESPONSE LIFECYCLE</text>
</svg>
