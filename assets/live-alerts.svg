<svg viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg" width="800" height="150">
  <rect width="800" height="150" fill="#0d1117" rx="10"/>

  <!-- Terminal bar -->
  <rect width="800" height="28" fill="#161b22" rx="10"/>
  <rect y="18" width="800" height="10" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="14" r="5" fill="#ffbd2e"/>
  <circle cx="54" cy="14" r="5" fill="#27c93f"/>
  <text x="400" y="19" text-anchor="middle" fill="#555" font-family="JetBrains Mono,monospace" font-size="10">alerts.log — live feed</text>

  <!-- Alert rows that appear and fade -->
  <!-- Row 1: Critical -->
  <rect x="10" y="36" width="780" height="22" rx="4" fill="rgba(255,68,68,0.08)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="51" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" opacity="0">
    [HIGH]<animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="0s" repeatCount="indefinite"/>
  </text>
  <text x="70" y="51" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="10" opacity="0">
    T1110 — Brute Force — 45.33.32.156 — 9 failed logins in 120s — AbuseIPDB: 97%
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="0s" repeatCount="indefinite"/>
  </text>

  <!-- Row 2: Medium -->
  <rect x="10" y="62" width="780" height="22" rx="4" fill="rgba(255,204,0,0.06)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="77" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" opacity="0">
    [MEDIUM]<animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="1s" repeatCount="indefinite"/>
  </text>
  <text x="84" y="77" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="10" opacity="0">
    T1078 — Valid Accounts — pam_unix(sudo:auth): authentication failure uid=1003
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- Row 3: High -->
  <rect x="10" y="88" width="780" height="22" rx="4" fill="rgba(255,136,0,0.07)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="103" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" opacity="0">
    [HIGH]<animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </text>
  <text x="66" y="103" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="10" opacity="0">
    T1110.004 — Credential Stuffing — POST /login 401 × 7 in 60s — 185.220.101.45
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Row 4: Medium -->
  <rect x="10" y="114" width="780" height="22" rx="4" fill="rgba(68,136,255,0.06)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="129" fill="#4488ff" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" opacity="0">
    [MEDIUM]<animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="3s" repeatCount="indefinite"/>
  </text>
  <text x="84" y="129" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="10" opacity="0">
    T1203 — Client Execution — kernel: program[4821]: segfault at 0x0 ip 00007f
    <animate attributeName="opacity" values="0;1;1;1;0" dur="8s" begin="3s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="136" width="8" height="12" fill="#00ff41" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
