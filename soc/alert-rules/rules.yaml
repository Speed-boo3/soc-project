rules:
  - id: RULE-001
    name: SSH Brute Force
    log_type: syslog
    condition:
      field: message
      contains: "Failed password"
      threshold: 3
    severity: high
    action: alert
    mitre:
      technique_id: T1110
      technique_name: Brute Force
      tactic: Credential Access

  - id: RULE-002
    name: Invalid User Login Attempt
    log_type: syslog
    condition:
      field: message
      contains: "Invalid user"
    severity: medium
    action: log
    mitre:
      technique_id: T1078
      technique_name: Valid Accounts
      tactic: Initial Access

  - id: RULE-003
    name: Sudo Authentication Failure
    log_type: syslog
    condition:
      field: message
      contains: "authentication failure"
    severity: medium
    action: log
    mitre:
      technique_id: T1078
      technique_name: Valid Accounts
      tactic: Privilege Escalation

  - id: RULE-004
    name: Credential Stuffing Attempt
    log_type: apache
    condition:
      field: request
      contains: "/login"
      status_code: 401
      threshold: 3
    severity: high
    action: alert
    mitre:
      technique_id: T1110.004
      technique_name: Credential Stuffing
      tactic: Credential Access

  - id: RULE-005
    name: Admin Path Probe
    log_type: apache
    condition:
      field: request
      contains: "/admin"
    severity: medium
    action: log
    mitre:
      technique_id: T1190
      technique_name: Exploit Public-Facing Application
      tactic: Initial Access

  - id: RULE-006
    name: Segfault Detected
    log_type: syslog
    condition:
      field: message
      contains: "segfault"
    severity: medium
    action: alert
    mitre:
      technique_id: T1203
      technique_name: Exploitation for Client Execution
      tactic: Execution

  - id: RULE-007
    name: Root Login Attempt
    log_type: syslog
    condition:
      field: message
      contains: "Failed password for root"
    severity: high
    action: alert
    mitre:
      technique_id: T1110
      technique_name: Brute Force
      tactic: Credential Access

  - id: RULE-008
    name: Port Scan Detected
    log_type: syslog
    condition:
      field: message
      contains: "SCAN"
    severity: medium
    action: log
    mitre:
      technique_id: T1046
      technique_name: Network Service Discovery
      tactic: Discovery

  - id: RULE-009
    name: Suspicious User Agent
    log_type: apache
    condition:
      field: user_agent
      contains: "sqlmap"
    severity: critical
    action: block
    mitre:
      technique_id: T1190
      technique_name: Exploit Public-Facing Application
      tactic: Initial Access

  - id: RULE-010
    name: Directory Traversal Attempt
    log_type: apache
    condition:
      field: request
      contains: "../"
    severity: high
    action: alert
    mitre:
      technique_id: T1083
      technique_name: File and Directory Discovery
      tactic: Discovery
